name: Test MEMIT-MLX

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-14  # Apple Silicon runner

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlx mlx-lm

    - name: Verify imports
      run: |
        python -c "from memit import MEMIT, check_fact; print('✅ Imports OK')"
        python -c "from model_adapter import get_adapter, GPT2Adapter, LlamaAdapter, Qwen35Adapter; print('✅ Adapters OK')"

    - name: Run basic test
      run: |
        python examples/edit_facts.py
