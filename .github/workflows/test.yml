name: Test MEMIT-MLX

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-14  # Apple Silicon runner

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlx mlx-lm transformers

    - name: Run benchmark (GPT-2 Small)
      run: |
        cd examples
        PYTHONPATH=.. python edit_facts.py

    - name: Verify outputs
      run: |
        echo "✅ MEMIT-MLX tests passed"
